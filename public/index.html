<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WH ERP // CORE OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-950 text-stone-100 font-sans antialiased selection:bg-indigo-500/30">

  <div class="flex h-screen w-screen overflow-hidden">
    
    <!-- SYSTEM SIDEBAR NAVIGATION -->
    <aside class="w-64 bg-stone-900 border-r border-stone-800 p-4 flex flex-col justify-between shrink-0">
      <div class="space-y-4">
        <div class="flex items-center gap-2 px-1 py-2 border-b border-stone-800">
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
          <span class="text-xs font-black uppercase tracking-widest text-white">WH ERP // CORE OS</span>
        </div>
        
        <nav class="space-y-1 text-xs font-bold text-stone-400">
          <button id="nav-admin" class="w-full flex items-center gap-2.5 px-3 py-2 bg-stone-800 text-white rounded-lg transition-all text-left">
            <span>👑</span> Admin Console
          </button>
          <button id="nav-bi" class="w-full flex items-center gap-2.5 px-3 py-2 hover:bg-stone-800 hover:text-white rounded-lg transition-all text-left">
            <span>📊</span> BI Strategic Deck
          </button>
        </nav>
      </div>

      <div class="pt-4 border-t border-stone-800">
        <div class="text-[9px] text-center text-stone-500 font-mono tracking-tight">
          v1.1 // Authorized Access Only
        </div>
      </div>
    </aside>

    <!-- WORKSPACE PANEL MOUNT REGION -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden bg-stone-100 text-stone-900">
      <header class="h-12 bg-white border-b border-stone-200 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-indigo-600"></span>
          <span class="text-xs font-black uppercase tracking-wider text-stone-500">SYSTEM PROFILE: ADMIN (ADMIN)</span>
        </div>
        <button class="px-2.5 py-1 text-[10px] font-black uppercase border border-stone-200 rounded-lg hover:bg-stone-50 transition-all text-stone-600 tracking-wider">
          Terminate Link
        </button>
      </header>
      
      <div class="flex-1 overflow-y-auto p-6 grid grid-cols-1 xl:grid-cols-3 gap-6 items-start">
        <div id="app-form-slot" class="xl:col-span-1"></div>
        <div id="app-view-slot" class="xl:col-span-2"></div>
      </div>
    </main>

  </div>

  <!-- Absolute workspace base script routing -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
